<script>
var GLOSSARY={
  "pass-through taxation":"Your business income goes directly to your personal tax return and is taxed once at your personal rate. The business itself pays no separate federal income tax.",
  "self-employment tax":"A 15.3% tax solo business owners pay for Social Security and Medicare. Unlike employees who split this with an employer, you pay the full amount yourself.",
  "EIN":"Employer Identification Number — a free 9-digit number from the IRS that identifies your business for tax purposes. Required to open a business bank account.",
  "operating agreement":"The rulebook for your LLC. Defines ownership, how decisions get made, profit splits, and what happens if you dissolve. Even solo founders should have one.",
  "registered agent":"A person or service with a physical address in your formation state who receives official legal documents on behalf of your business. Required in every state.",
  "Articles of Organization":"The official document you file with your state to legally create your LLC. This is the actual formation filing.",
  "S-Corp election":"A tax status you apply for with the IRS. You pay yourself a salary and take remaining profit as distributions — distributions aren't subject to self-employment tax, which saves real money once net profit is consistently above $80K.",
  "double taxation":"When a C-Corporation pays income tax on its profits, and then shareholders also pay personal income tax on dividends. The same money taxed twice.",
  "Form 2553":"The IRS form you file to request S-Corporation tax treatment for your LLC. Must be filed within 75 days of forming, or by March 15 for an existing LLC.",
  "83(b) election":"An IRS filing made within 30 days of receiving company shares. It locks in your tax basis at today's low value. Missing this deadline is one of the most expensive startup mistakes — it cannot be extended.",
  "cap table":"A record of who owns what percentage of your company, at what price, and what type of ownership.",
  "QSBS":"Qualified Small Business Stock. Early investors and founders in a C-Corp may exclude up to $10 million in gains from federal tax if shares are held for five or more years.",
  "sole proprietor":"Operating a business under your own name with no formal legal entity. No filing required to start, but your personal assets are not legally separated from business debts.",
  "distributions":"Money paid out to business owners from profits. In an S-Corp, distributions above your salary are not subject to self-employment tax.",
  "bookkeeping":"Tracking every dollar your business earns and spends. Even basic bookkeeping keeps you ready for taxes and protected if you're ever audited.",
  "Schedule C":"A form attached to your personal tax return where you report business income and expenses. Most single-member LLC owners use this.",
  "K-1":"A tax document each partner in a multi-member LLC receives showing their share of income and losses to report on their personal tax return.",
  "capital accounts":"Individual records tracking each member's contributions, profit shares, and withdrawals in a multi-member LLC.",
  "foreign entity":"When your company is formed in one state but you operate in another, you must register as a foreign entity in your home state and pay filing fees there too."
};

function applyGlossary(){
  var wrap=document.getElementById('resultsWrap');
  if(!wrap) return;
  function walk(node){
    if(node.nodeType===3){
      var text=node.textContent,lower=text.toLowerCase(),hit=false;
      Object.keys(GLOSSARY).forEach(function(t){if(lower.indexOf(t.toLowerCase())>-1)hit=true;});
      if(!hit) return;
      var html=text;
      Object.keys(GLOSSARY).sort(function(a,b){return b.length-a.length;}).forEach(function(term){
        var def=GLOSSARY[term];
        var esc=term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        var re=new RegExp('(?<![\\w>-])('+esc+')(?![\\w<])','i');
        html=html.replace(re,'<span class="tt">$1<span class="tt-box"><span class="tt-label">'+term+'</span>'+def+'</span></span>');
      });
      if(html!==text){var span=document.createElement('span');span.innerHTML=html;node.parentNode.replaceChild(span,node);}
    } else if(node.nodeType===1&&node.tagName!=='SCRIPT'&&!node.classList.contains('tt-box')&&!node.classList.contains('tt')){
      Array.from(node.childNodes).forEach(walk);
    }
  }
  Array.from(wrap.childNodes).forEach(walk);
  wrap.querySelectorAll('.tt').forEach(function(el){
    if(!el._ttBound){el._ttBound=true;el.addEventListener('click',function(e){e.stopPropagation();document.querySelectorAll('.tt.active').forEach(function(o){if(o!==el)o.classList.remove('active');});el.classList.toggle('active');});}
  });
}

document.addEventListener('click',function(){document.querySelectorAll('.tt.active').forEach(function(el){el.classList.remove('active');});});

var answers=JSON.parse(localStorage.getItem('aether_answers')||'{}');

function readiness(a){
  if(a.investors==='Yes, investors') return'FORM_NOW';
  if(a.revenue==='$500K+') return'FORM_NOW';
  if(a.revenue==='$125K \u2013 $500K'||a.revenue==='$125K - $500K') return'FORM_NOW';
  if(a.owners==='Just me'&&a.businessFocus==='Services'&&a.revenue==='Under $50K'&&a.confidence==='Still figuring it out') return'EDGE_CASE';
  var hold=0;
  if(a.revenue==='Under $50K') hold++;
  if(a.confidence==='Still figuring it out') hold++;
  if(a.businessFocus==='Other') hold++;
  if(a.priority==='Administrative simplicity'&&a.revenue==='Under $50K') hold++;
  if(hold>=2) return'HOLD';
  return'FORM_NOW';
}

function decide(a){
  if(!a.revenue&&!a.owners) return null;
  var owners=a.owners||'',investors=a.investors||'',rev=a.revenue||'',priority=a.priority||'';
  if(investors==='Yes, investors') return'C-Corporation';
  if(owners==='2 owners'||owners==='3 \u2013 4'||owners==='5+') return'Multi-Member LLC';
  if((rev==='$125K \u2013 $500K'||rev==='$500K+')&&priority==='Minimize taxes') return'LLC with S-Corp Election';
  return'Single-Member LLC';
}

var CONTENT={
  'Single-Member LLC':{
    balance:"Protects you without overhead you don't need yet. Not the default answer — the right one for where you are.",
    qualifier:"Right for where you are. When that changes, AETHER will tell you.",
    means:"A Single-Member LLC separates your personal assets from your business legally. If the business is sued or owes money, your personal savings and home are not at risk. Income reports on your personal return — no corporate filing. Simplest formal structure that actually protects you.",
    tax:["Business income passes directly to your personal return. The business pays no separate federal tax.","You pay income tax plus self-employment tax on net profit. Self-employment tax is 15.3% — Social Security and Medicare. Unlike an employee, you cover the full amount.","Income and expenses go on a Schedule C with your personal return. Every deduction directly reduces your taxable profit."],
    upgrade:["An S-Corp election is worth evaluating once net profit consistently exceeds $80,000.","At that level, splitting income into salary and distributions reduces self-employment tax enough to cover the added overhead.","Below that threshold, the complexity costs more than it saves. This is the right structure now."],
    notFit:[{l:"S-Corp Election",r:"The math doesn't work yet. It saves money when net profit is consistently above $80K. Below that, you're adding payroll complexity for no return."},{l:"C-Corporation",r:"C-Corps exist for one reason — raising institutional capital. Without that plan, you're carrying the weight of a structure built for a different situation."},{l:"Multi-Member LLC",r:"You're the only owner. This structure is for businesses with two or more co-founders."}],
    steps:["Choose your formation state — your home state is almost always the right move to start","File your Articles of Organization with your state","Apply for your EIN at irs.gov — free and takes about 10 minutes online","Open a dedicated business bank account using your EIN","Draft a single-member operating agreement — even as a solo founder, this protects you","Set up basic bookkeeping from day one — never mix personal and business funds"]
  },
  'Multi-Member LLC':{
    balance:"Covers shared ownership cleanly. Taxes stay straightforward. Governance is defined.",
    qualifier:"Right for your team at this stage. When you scale or raise, you'll know it's time to reassess.",
    means:"A Multi-Member LLC protects all owners and keeps taxes straightforward. Each member pays taxes on their share through their personal return — no corporate tax. The operating agreement is the most important document you'll create. It defines ownership, decision-making, and what happens when a partner exits.",
    tax:["The LLC pays no federal income tax. Each member reports and pays tax on their share personally.","The business files a Form 1065 annually. Each member receives a K-1 showing their income and loss share.","Each member owes self-employment tax on their share. Work with a CPA before year-end on estimated quarterly payments."],
    upgrade:["An S-Corp election becomes worth evaluating once combined net profit justifies the payroll overhead.","If you pursue institutional investment, a C-Corporation conversion will be required.","For now, this covers your situation cleanly."],
    notFit:[{l:"Single-Member LLC",r:"You have co-founders. A single-member structure doesn't cover shared ownership or partner governance."},{l:"C-Corporation",r:"No institutional investors in the plan right now. Adds significant legal cost and complexity without the capital-raise benefit."},{l:"S-Corp Election",r:"Available later, but the payroll requirements add overhead that isn't worth it at this stage."}],
    steps:["Agree on ownership percentages in writing before you file anything","File your Articles of Organization listing all members","Apply for your EIN — required for multi-member entities even without employees","Draft a comprehensive operating agreement — get legal review, not a template","Open a business bank account with capital accounts tracked for each member","Set up basic bookkeeping and calendar your state annual report deadline"]
  },
  'LLC with S-Corp Election':{
    balance:"Your revenue makes tax optimization worth the added structure. This is how you keep more of what you earn.",
    qualifier:"The math works at your revenue level. Most founders at this stage who skip this leave real money behind.",
    means:"You form an LLC, then file an election with the IRS to have it taxed as an S-Corporation. Income splits into two parts: a salary and distributions. Only the salary carries self-employment tax. At your revenue level, the difference between the two is significant.",
    tax:["You pay yourself a salary. Payroll taxes apply to that salary — Social Security and Medicare.","Profit above your salary is taken as distributions — not subject to self-employment tax. That's where the savings are.","The IRS requires a defensible salary — market rate for your role. A CPA should set this number."],

function buildEcho(a){
  var parts=[];
  if(a.formationState) parts.push(a.formationState==='My Home State'?(a.operatingState||'home state'):a.formationState);
  if(a.owners) parts.push(a.owners.toLowerCase());
  if(a.revenue) parts.push(a.revenue);
  return parts.length?'Based on your answers \u2014 '+parts.join(' \u00B7 '):'Based on your answers';
}

function buildSituation(a,entity){
  var parts=[];
  if(a.owners==='Just me') parts.push("You're a solo founder");
  else if(a.owners==='2 owners') parts.push("You're building with a co-founder");
  else if(a.owners==='3 \u2013 4'||a.owners==='3 - 4') parts.push("You have a small founding team");
  else if(a.owners==='5+') parts.push("You have a larger ownership group");
  else parts.push("You're starting out");
  if(a.investors==='Yes, investors') parts.push("planning to raise outside investment");
  else parts.push("not raising outside capital");
  if(a.revenue==='Under $50K') parts.push("early-stage revenue");
  else if(a.revenue==='$50K \u2013 $125K'||a.revenue==='$50K - $125K') parts.push("early traction");
  else if(a.revenue==='$125K \u2013 $500K'||a.revenue==='$125K - $500K') parts.push("scaling revenue");
  else if(a.revenue==='$500K+') parts.push("established revenue");
  var s=parts.join(', ')+'.';
  if(a.priority==='Minimize taxes') s+=' You want to reduce your tax burden as income grows.';
  else if(a.priority==='Limit liability') s+=' You want your personal assets protected from business risk.';
  else if(a.priority==='Administrative simplicity') s+=' You want to keep things simple and manageable while you build.';
  if(a.operatingState) s+=' Operating in '+a.operatingState+'.';
  return s.charAt(0).toUpperCase()+s.slice(1);
}

function buildFit(a,entity){
  var pts=[];
  if(a.owners==='Just me') pts.push("You are the only owner — a single-member structure is the simplest and cleanest option");
  else if(a.owners==='2 owners') pts.push("You have a co-founder — a multi-member structure is required to cover shared ownership correctly");
  else if(a.owners==='3 \u2013 4'||a.owners==='3 - 4') pts.push("You have a small founding team — this structure covers shared ownership and governance");
  else if(a.owners==='5+') pts.push("You have five or more owners — this structure covers the governance complexity that requires");
  if(a.investors==='Yes, investors') pts.push("You plan to raise outside investment — a C-Corporation is what investors will expect and require");
  else pts.push("You are not raising outside capital — you don't need the complexity of a corporation");
  if(a.revenue==='Under $50K') pts.push("Your current revenue range doesn't justify more complex structures — low overhead is the right priority");
  else if(a.revenue==='$50K \u2013 $125K'||a.revenue==='$50K - $125K') pts.push("Your revenue is building — this structure creates a solid foundation without unnecessary overhead");
  else if(a.revenue==='$125K \u2013 $500K'||a.revenue==='$125K - $500K') pts.push("Your revenue level justifies the tax optimization this structure provides");
  else if(a.revenue==='$500K+') pts.push("Your revenue level makes structure optimization a meaningful financial decision");
  if(a.priority==='Minimize taxes') pts.push("You prioritized minimizing taxes — this recommendation reflects that directly");
  else if(a.priority==='Limit liability') pts.push("You prioritized protecting your personal assets — this structure creates that separation");
  else if(a.priority==='Administrative simplicity') pts.push("You prioritized keeping things simple — this structure has the lowest ongoing administrative requirements");
  return pts;
}

function formAnyway(){
  var wrap=document.getElementById('resultsWrap');

  renderBlueprint(wrap,entity,true);
}

function resetScan(){
  localStorage.setItem('aether_step','0');
  window.location.href='scan.html';
}

function buildHeadsUp(a, entity){
  var tips = [];

  // Formation state mismatch
  if(a.formationState && a.formationState !== 'My Home State' && a.operatingState){
    tips.push("Forming outside your home state usually means filing in two places — worth confirming the cost difference before you decide.");
  }

  // Multi-member with no mention of agreement
  if(a.owners && a.owners !== 'Just me'){
    tips.push("Whatever you agree on with your co-founders now, writing it down early is a lot easier than trying to remember it later.");
  }

  // Solo service founder — no separate account habit
  if(a.owners === 'Just me' && a.businessFocus === 'Services'){
    tips.push("Keeping business and personal money in separate accounts from day one makes tax time a lot less complicated.");
  }

  // Pre-revenue but forming — gentle nudge
  if(a.revenue === 'Under $50K' && entity === 'Single-Member LLC'){
    tips.push("Most states charge an annual fee to keep your LLC active — good to know before you file so there are no surprises.");
  }

  // S-Corp path — payroll heads up
  if(entity === 'LLC with S-Corp Election'){
    tips.push("The S-Corp election requires running payroll for yourself — not complicated, but it's a step people sometimes miss until tax season.");
  }

  // C-Corp path — 83b heads up
  if(entity === 'C-Corporation'){
    tips.push("If you issue shares at formation, the 83(b) election window is 30 days. It's one of those things that's easy to miss and hard to fix.");
  }

  // Investor path — Delaware foreign entity
  if(a.investors === 'Yes, investors' && a.operatingState && a.operatingState !== 'Delaware'){
    tips.push("Forming in Delaware and operating in "+a.operatingState+" means registering in both — just something to factor into your setup budget.");
  }

  // Priority is simplicity but has partners
  if(a.priority === 'Administrative simplicity' && a.owners !== 'Just me'){
    tips.push("Multi-member LLCs have a few more annual requirements than solo ones — still manageable, just worth knowing upfront.");
  }

  // Confidence is low — general reassurance
  if(a.confidence === 'Still figuring it out'){
    tips.push("The fact that you're thinking about structure before filing puts you ahead of most first-time founders.");
  }

  // Return max 3, most relevant
  return tips.slice(0, 3);
}

function render(){
  var wrap=document.getElementById('resultsWrap');
  if(!answers.revenue&&!answers.owners){
    wrap.innerHTML='<div class="no-data"><h2>No scan data found.</h2><p>Complete the Structure Scan to generate your recommendation.</p><a href="scan.html" style="display:inline-flex;align-items:center;gap:10px;padding:14px 32px;background:#C9A14A!important;color:#061729!important;font-family:Inter,sans-serif;font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;text-decoration:none;">Begin Scan \u2192</a></div>';
    return;
  }
  var verdict=readiness(answers);
  if(verdict==='HOLD'){renderHold(wrap);return;}
  if(verdict==='EDGE_CASE'){renderEdge(wrap);return;}
  var entity=decide(answers)||'Single-Member LLC';
  renderBlueprint(wrap,entity,false);
}

render();

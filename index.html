<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#061729">
<title>AETHER — Find the Right Business Structure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#020810;color:#C8DEFF;font-family:'Inter',sans-serif;overflow:hidden;}
.scene{position:fixed;inset:0;z-index:0;}
.sky-glow{position:absolute;bottom:33%;left:0;right:0;height:180px;background:linear-gradient(to top,rgba(201,161,74,0.13),rgba(201,161,74,0.04) 50%,transparent);pointer-events:none;}
.sky-horizon{position:absolute;bottom:35%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(201,161,74,0.45) 50%,transparent 95%);pointer-events:none;}
.sky-stars{position:absolute;top:0;left:0;right:0;bottom:36%;}
.sky-buildings{position:absolute;bottom:0;left:0;right:0;height:35%;display:flex;align-items:flex-end;justify-content:center;}
.bld{background:linear-gradient(to top,#0c1e34,#050e1d);flex-shrink:0;position:relative;}
.bld::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(201,161,74,0.22);}
.sky-terms{position:absolute;inset:0;pointer-events:none;}
.sky-term{position:absolute;font-family:'Cormorant Garamond',serif;font-style:italic;color:#C9A14A;white-space:nowrap;text-shadow:0 0 16px rgba(201,161,74,0.2);}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 20%,rgba(2,8,16,0.65) 100%);pointer-events:none;}
.bottom-fade{position:absolute;bottom:0;left:0;right:0;height:160px;background:linear-gradient(to top,#020810,transparent);pointer-events:none;}
.wrap{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;letter-spacing:0.28em;color:#C9A14A;text-transform:uppercase;margin-bottom:56px;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,5vw,54px);font-weight:300;line-height:1.15;color:#EEF6FF;margin-bottom:20px;max-width:560px;}
p.sub{font-size:15px;color:#6A90B8;line-height:1.7;margin-bottom:40px;max-width:360px;}
.btn{display:inline-block;padding:16px 40px;background:#C9A14A;color:#061729;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;-webkit-appearance:none;transition:background 0.2s;}
.btn:hover{background:#E2C07A;}
.note{margin-top:16px;font-size:11px;color:#304F6A;letter-spacing:0.06em;}
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="sky-glow"></div>
  <div class="sky-horizon"></div>
  <div class="sky-stars" id="stars"></div>
  <div class="sky-buildings" id="buildings"></div>
  <div class="sky-terms" id="terms"></div>
  <div class="vignette"></div>
  <div class="bottom-fade"></div>
</div>
<div class="wrap">
  <div class="logo">Aether</div>
  <h1>Find the Right Business Structure in 2 Minutes</h1>
  <p class="sub">Answer a few questions. Get a clear recommendation.</p>
  <a href="scan.html" class="btn">Start Aether Scan</a>
  <p class="note">No account required. Free.</p>
</div>
<script>
var BW=[14,20,26,16,38,24,18,32,20,14,28,22,16,40,14,24,18,14,26,20,32,16,24,20,14,18,28,22,36,18];
var BH=[70,110,160,120,220,190,140,250,200,100,150,120,85,240,75,135,100,65,175,125,220,80,150,110,68,90,170,130,200,80];
var bldEl=document.getElementById('buildings');
BW.forEach(function(w,i){
  var b=document.createElement('div');
  b.className='bld';
  b.style.cssText='width:'+w+'px;height:'+BH[i]+'px;';
  bldEl.appendChild(b);
});
var stEl=document.getElementById('stars');
for(var i=0;i<60;i++){
  var s=document.createElement('div');
  s.style.cssText='position:absolute;width:1px;height:1px;background:rgba(201,161,74,0.85);border-radius:50%;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;opacity:'+(0.1+Math.random()*0.6)+';';
  stEl.appendChild(s);
}
var TERMS=['LLC','S-Corp','C-Corp','EIN','Formation','Operating Agreement','Equity','Registered Agent','Pass-Through','Cap Table','Compliance','C-Corporation'];
var tEl=document.getElementById('terms');
TERMS.forEach(function(t){
  var el=document.createElement('div');
  el.className='sky-term';
  el.textContent=t;
  el.style.cssText='left:'+(5+Math.random()*80)+'%;top:'+(5+Math.random()*72)+'%;font-size:'+(13+Math.random()*20)+'px;opacity:'+(0.1+Math.random()*0.28)+';';
  tEl.appendChild(el);
});
</script>
</body>
</html>
